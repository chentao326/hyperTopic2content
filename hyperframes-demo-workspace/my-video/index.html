<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>HyperTopic MP4 口播模板</title>
    <script src="./node_modules/gsap/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0e1a;
        font-family: "Inter", sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0e1a;
      }

      .clip {
        position: absolute;
        inset: 0;
      }

      .scene-intro {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 100%);
        color: #fff;
        text-align: center;
      }

      .scene-intro .badge {
        margin-bottom: 40px;
        color: #4ec9b0;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 8px;
        text-transform: uppercase;
      }

      .scene-intro h1 {
        max-width: 1600px;
        margin-bottom: 30px;
        background: linear-gradient(90deg, #4ec9b0 0%, #5fa8ff 100%);
        background-clip: text;
        color: transparent;
        font-size: 120px;
        font-weight: 900;
        line-height: 1.05;
      }

      .scene-intro .sub {
        max-width: 1500px;
        color: #b8c5d6;
        font-size: 42px;
        font-weight: 300;
        line-height: 1.3;
      }

      .scene-main {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(180deg, #0a0e1a 0%, #15203a 50%, #0a0e1a 100%);
      }

      .scene-main::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(78, 201, 176, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(78, 201, 176, 0.04) 1px, transparent 1px);
        background-size: 80px 80px;
        pointer-events: none;
      }

      .top-tag {
        position: absolute;
        top: 60px;
        left: 80px;
        color: #4ec9b0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 4px;
        opacity: 0.75;
        text-transform: uppercase;
      }

      .caption-layer {
        position: absolute;
        inset: 0;
      }

      .caption-group {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding: 0 120px 200px;
        color: #fff;
        font-size: 72px;
        font-weight: 700;
        line-height: 1.4;
        opacity: 0;
        text-align: center;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }

      .word {
        display: inline-block;
        margin: 0 4px;
      }

      .progress {
        position: absolute;
        right: 80px;
        bottom: 80px;
        left: 80px;
        height: 4px;
        overflow: hidden;
        border-radius: 2px;
        background: rgba(78, 201, 176, 0.15);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4ec9b0, #5fa8ff);
      }

      .template-error {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 120px;
        background: #0a0e1a;
        color: #ff6b6b;
        font-size: 42px;
        line-height: 1.5;
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="root"
      data-start="0"
      data-duration="180"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="intro"
        class="clip"
        data-start="0"
        data-duration="3"
        data-track-index="1"
      >
        <div class="scene-intro">
          <div class="badge" data-field="topic-label">HYPERTOPIC</div>
          <h1 data-field="title">口播视频标题</h1>
          <div class="sub" data-field="subtitle">根据 DESIGN.md 替换标题、配色和章节文案</div>
        </div>
      </div>

      <div
        id="main"
        class="clip"
        data-start="0"
        data-duration="177"
        data-track-index="1"
      >
        <div class="scene-main">
          <div class="top-tag" data-field="top-tag">核心观点</div>
          <div class="caption-layer" id="caption-layer"></div>
          <div class="progress">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>

      <audio
        id="voiceover"
        data-start="0"
        data-duration="180"
        data-track-index="2"
        src="audio.mp3"
        data-volume="1"
      ></audio>

      <div class="template-error" id="template-error"></div>
    </div>

    <script>
      (function () {
        function fail(message) {
          var el = document.getElementById("template-error");
          el.textContent = message;
          el.style.display = "grid";
          throw new Error(message);
        }

        if (!window.gsap) {
          fail("缺少本地 GSAP。请先在 my-video 中执行 NODE_ENV=development npm install gsap。");
        }

        function loadTranscript() {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", "transcript.json", false);
          xhr.send(null);
          if (xhr.status !== 200 && xhr.status !== 0) {
            fail("无法读取 transcript.json，请确认它已复制到 my-video/。");
          }
          try {
            return JSON.parse(xhr.responseText);
          } catch (error) {
            fail("transcript.json 不是合法 JSON。");
          }
        }

        function loadAudioDuration() {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", "duration.json", false);
          xhr.send(null);
          if (xhr.status !== 200 && xhr.status !== 0) {
            fail("无法读取 duration.json，请先用 ffprobe 写入真实音频时长。");
          }
          var data;
          try {
            data = JSON.parse(xhr.responseText);
          } catch (error) {
            fail("duration.json 不是合法 JSON。");
          }
          var duration = Number(data.duration);
          if (!Number.isFinite(duration) || duration <= 0) {
            fail("duration.json 必须包含正数 duration。");
          }
          return duration;
        }

        function normalizeWords(raw) {
          if (!Array.isArray(raw)) {
            fail("transcript.json 必须是词数组。");
          }

          var words = raw
            .map(function (w, index) {
              return {
                id: String(w.id || "w" + index).replace(/[^a-zA-Z0-9_-]/g, "_"),
                text: String(w.text || "").trim(),
                start: Number(w.start),
                end: Number(w.end)
              };
            })
            .filter(function (w) {
              return w.text && Number.isFinite(w.start) && Number.isFinite(w.end) && w.end > w.start;
            });

          if (!words.length) {
            fail("transcript.json 没有可用词级时间戳。");
          }

          return words;
        }

        function groupWords(words) {
          var groups = [];
          var cur = [];
          words.forEach(function (word) {
            cur.push(word);
            if (cur.length >= 8 || /[。，！？,!?]/.test(word.text)) {
              groups.push(cur);
              cur = [];
            }
          });
          if (cur.length) groups.push(cur);
          return groups;
        }

        var words = normalizeWords(loadTranscript());
        var groups = groupWords(words);
        var introDuration = 3;
        var lastEnd = words[words.length - 1].end;
        var audioDuration = loadAudioDuration();
        var totalDuration = Math.max(audioDuration, lastEnd);
        var mainDuration = Math.max(totalDuration, 1);

        var root = document.getElementById("root");
        var main = document.getElementById("main");
        var audio = document.getElementById("voiceover");
        root.dataset.duration = String(totalDuration);
        main.dataset.duration = String(mainDuration);
        audio.dataset.duration = String(audioDuration);

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var captionLayer = document.getElementById("caption-layer");

        tl.to("#progress-fill", { width: "100%", duration: audioDuration, ease: "none" }, 0);

        groups.forEach(function (group, groupIndex) {
          var el = document.createElement("div");
          el.className = "caption-group";
          el.id = "g-" + groupIndex;

          group.forEach(function (word) {
            var span = document.createElement("span");
            span.className = "word";
            span.id = "word-" + word.id;
            span.textContent = word.text;
            el.appendChild(span);
          });

          captionLayer.appendChild(el);
          tl.to(el, { opacity: 1, duration: 0.25, ease: "power2.out" }, group[0].start);
          tl.to(el, { opacity: 0, duration: 0.2, ease: "power2.in" }, group[group.length - 1].end + 0.15);

          group.forEach(function (word) {
            var selector = "#word-" + word.id;
            tl.to(selector, {
              color: "#4ec9b0",
              scale: 1.05,
              textShadow: "0 0 24px rgba(78,201,176,0.6)",
              duration: 0.05,
              ease: "power2.out"
            }, word.start);
            tl.to(selector, {
              color: "#6b7a90",
              fontWeight: 400,
              scale: 1,
              duration: 0.05,
              ease: "power2.in"
            }, word.end);
          });
        });

        tl.to("#intro", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.6);
        tl.from("#main", { opacity: 0, duration: 0.4, ease: "power2.out" }, 2.6);

        window.__timelines.root = tl;
      })();
    </script>
  </body>
</html>
