<html lang="zh-CN">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0e1a;
        font-family: "Inter", sans-serif;
      }

      /* 场景 1: 开场标题 */
      .scene-intro {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 100%);
        color: #fff;
        text-align: center;
      }
      .scene-intro .badge {
        font-size: 28px;
        letter-spacing: 8px;
        color: #4ec9b0;
        margin-bottom: 40px;
        text-transform: uppercase;
        font-weight: 600;
      }
      .scene-intro h1 {
        font-size: 140px;
        font-weight: 900;
        margin-bottom: 30px;
        background: linear-gradient(90deg, #4ec9b0 0%, #5fa8ff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 4px;
      }
      .scene-intro .sub {
        font-size: 42px;
        color: #b8c5d6;
        font-weight: 300;
        letter-spacing: 2px;
      }

      /* 场景 2: 主体口播（深色背景+字幕） */
      .scene-main {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #0a0e1a 0%, #15203a 50%, #0a0e1a 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .scene-main::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(78, 201, 176, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(78, 201, 176, 0.04) 1px, transparent 1px);
        background-size: 80px 80px;
        pointer-events: none;
      }

      /* 关键提示词（高亮样式） */
      .scene-main .current-caption {
        position: absolute;
        bottom: 200px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 72px;
        font-weight: 700;
        color: #fff;
        line-height: 1.4;
        letter-spacing: 2px;
        padding: 0 120px;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }
      .scene-main .current-caption .word {
        display: inline-block;
        margin: 0 4px;
        transition: color 0.1s, transform 0.2s;
      }
      .scene-main .current-caption .word.spoken {
        color: #6b7a90;
        font-weight: 400;
      }
      .scene-main .current-caption .word.active {
        color: #4ec9b0;
        transform: scale(1.05);
        text-shadow: 0 0 24px rgba(78, 201, 176, 0.6);
      }

      /* 顶部小标签 */
      .scene-main .top-tag {
        position: absolute;
        top: 60px;
        left: 80px;
        font-size: 24px;
        color: #4ec9b0;
        letter-spacing: 4px;
        font-weight: 600;
        text-transform: uppercase;
        opacity: 0.7;
      }

      /* 进度条 */
      .scene-main .progress {
        position: absolute;
        bottom: 80px;
        left: 80px;
        right: 80px;
        height: 4px;
        background: rgba(78, 201, 176, 0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      .scene-main .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4ec9b0, #5fa8ff);
        width: 0%;
      }
    </style>
  </head>

      </div>
      </div>
    </div>

    <div

      // 工具：找出 t 时刻正在说的词
      function findActiveWord(t) {
        for (let i = 0; i < WORDS.length; i++) {
          if (t >= WORDS[i].start && t < WORDS[i].end) return i;
        }
        return -1;
      }

      // 工具：把词分组（每行最多 8 个词，按标点断句）
      function groupWords() {
        const groups = [];
        let cur = [];
        for (let i = 0; i < WORDS.length; i++) {
          cur.push(WORDS[i]);
          if (cur.length >= 8 || /[。，！？,!?]/.test(WORDS[i].text)) {
            groups.push(cur);
            cur = [];
          }
        }
        if (cur.length) groups.push(cur);
        return groups;
      }

      const GROUPS = groupWords();

      // 找到当前应显示的 group
      function findGroupAt(t) {
        for (let i = 0; i < GROUPS.length; i++) {
          const g = GROUPS[i];
          if (t < g[0].start) return { group: g, index: i, status: "future" };
          if (t >= g[0].start && t <= g[g.length - 1].end + 0.3) {
            return { group: g, index: i, status: "active" };
          }
        }
        return { group: null, index: -1, status: "past" };
      }

      // ============= 渲染 =============
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1) 进度条填充
      tl.to("#progress-fill", { width: "100%", duration: 45, ease: "none" }, 3);

      // 2) 字幕：每个 group 显示 / 隐藏
      // 初始化 caption 为空
      const captionEl = document.getElementById("caption");
      captionEl.innerHTML = "";

      GROUPS.forEach(function (group, gi) {
        const el = document.createElement("div");
        el.id = "g-" + gi;
        el.style.position = "absolute";
        el.style.inset = "0";
        el.style.display = "flex";
        el.style.justifyContent = "center";
        el.style.alignItems = "flex-end";
        el.style.paddingBottom = "200px";
        el.style.paddingLeft = "120px";
        el.style.paddingRight = "120px";
        el.style.opacity = "0";
        el.style.textAlign = "center";
        el.style.fontSize = "72px";
        el.style.fontWeight = "700";
        el.style.color = "#fff";
        el.style.lineHeight = "1.4";
        el.style.letterSpacing = "2px";
        el.style.textShadow = "0 4px 20px rgba(0,0,0,0.6)";

        group.forEach(function (w) {
          const span = document.createElement("span");
          span.className = "word";
          span.id = "w-" + w.id;
          span.textContent = w.text;
          span.style.margin = "0 4px";
          span.style.display = "inline-block";
          el.appendChild(span);
        });

        captionEl.parentElement.appendChild(el);

        // 入场: 在 group.start 出现
        tl.to(el, { opacity: 1, duration: 0.25, ease: "power2.out" }, group[0].start);
        // 离场: 在 group 最后词的 end + 0.1 消失
        const lastEnd = group[group.length - 1].end;
        tl.to(el, { opacity: 0, duration: 0.2, ease: "power2.in" }, lastEnd);
      });

      // 3) 每个词高亮：active 状态
      GROUPS.forEach(function (group) {
        group.forEach(function (w) {
          const id = "#w-" + w.id;
          tl.to(id, {
            color: "#4ec9b0",
            scale: 1.05,
            textShadow: "0 0 24px rgba(78,201,176,0.6)",
            duration: 0.05,
            ease: "power2.out"
          }, w.start);
          tl.to(id, {
            color: "#6b7a90",
            fontWeight: 400,
            scale: 1,
            duration: 0.05,
            ease: "power2.in"
          }, w.end);
        });
      });

      // 4) 开场标题淡出 → 主体入场
      tl.to("#intro", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.6);
      tl.from("#main", { opacity: 0, duration: 0.4, ease: "power2.out" }, 2.6);

      // 注册时间轴
      window.__timelines["root"] = tl;
    </script>
